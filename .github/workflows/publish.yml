name: publish
on:
  push:
    branches: [staging]
    tags: ['llmcli/v*']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  publish:
    uses: Roxabi/.github/.github/workflows/publish-container.yml@v1
    with:
      image_name: ghcr.io/roxabi/llmcli
      release_please_component: llmcli
      dockerfile_path: ./deploy/Dockerfile.llm
