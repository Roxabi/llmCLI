name: CI
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:2.11-alpine
        ports: ["4222:4222"]
        options: >-
          --health-cmd "wget -qO- http://localhost:8222/healthz || true"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v7
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run ruff check --select=PYI .
      - name: Test (unit)
        run: uv run pytest -m "not nats"
      - name: Test (nats integration)
        run: uv run --extra nats pytest -m nats
        env:
          NATS_URL: nats://localhost:4222

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          extra_args: --results=verified,unknown
