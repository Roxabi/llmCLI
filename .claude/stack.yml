schema_version: "1.0"

runtime: python
package_manager: uv

backend:
  framework: typer
  path: src/llmcli

docs:
  framework: none
  path: docs
  format: md

build:
  formatter: ruff
  formatter_config: pyproject.toml
  formatter_fix_cmd: "uv run ruff format . && uv run ruff check --fix ."

testing:
  unit: pytest
  secrets: trufflehog  # canonical CI scan (.github/workflows/ci.yml); local pre-commit hook uses gitleaks for faster dev iteration

deploy:
  platform: none

commands:
  dev: uv run llmcli
  test: uv run pytest
  lint: uv run ruff check .
  format: uv run ruff format .
  typecheck: uv run ruff check --select=PYI .
  install: uv sync
  worktree_setup: tools/worktree-setup.sh

artifacts:
  analyses: artifacts/analyses
  specs: artifacts/specs
  frames: artifacts/frames
  plans: artifacts/plans

standards:
  backend: docs/standards/backend-patterns.md
  testing: docs/standards/testing.md
  code_review: docs/standards/code-review.md
  architecture: docs/architecture/
  contributing: docs/contributing.md

lsp:
  enabled: true
  server: pyright  # NOTE: pre-commit `typecheck` hook uses `ruff --select=PYI` (lint-only); full pyright wiring TBD

# Quality gates — Python code-hygiene contracts (opt-in).
# When section is absent: all gates OFF (backwards-compatible).
# When section is present but a sub-block is absent: that gate OFF.
# Gates are installed/synced by /release-setup --force via the quality-gates cookbook
# (plugins/dev-core/skills/release-setup/cookbooks/quality-gates.md).
# Python-only — stack-setup skips this section when runtime != python.
quality_gates:
  file_length:
    enabled: true
    max_lines: 300                             # default 300
    globs: ["src/**/*.py"]
    exemptions_file: tools/file_exemptions.txt # format: <path> <issue-url> (space-separated)
  folder_size:
    enabled: true
    max_files: 12                              # default 12
    globs: ["src/**"]
    exemptions_file: tools/folder_exemptions.txt
  import_layers:
    enabled: true
    stage: pre-push                            # pre-commit | pre-push (default pre-push; lint-imports is slow)
    config: .importlinter
