repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: typecheck
        name: typecheck
        entry: uv run ruff check --select=PYI .
        language: system
        pass_filenames: false
      - id: check-file-length
        name: check-file-length
        entry: tools/check_file_length.sh
        language: system
        pass_filenames: false
      - id: check-folder-size
        name: check-folder-size
        entry: tools/check_folder_size.sh
        language: system
        pass_filenames: false
      - id: import-layers
        name: import-layers
        entry: uv run lint-imports
        language: system
        pass_filenames: false
      - id: gitleaks
        name: gitleaks secret scan
        entry: gitleaks detect --source . --no-git
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: license
        name: license check
        entry: uv run tools/license_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
