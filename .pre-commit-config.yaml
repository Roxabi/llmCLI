repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: typecheck
        name: typecheck
        entry: uv run ruff check --select=PYI .
        language: system
        pass_filenames: false
      - id: check-file-length
        name: check-file-length
        entry: tools/check_file_length.sh
        language: system
        pass_filenames: false
      - id: check-folder-size
        name: check-folder-size
        entry: tools/check_folder_size.sh
        language: system
        pass_filenames: false
      - id: import-layers
        name: import-layers
        entry: uv run lint-imports
        language: system
        pass_filenames: false
      - id: gitleaks
        name: gitleaks secret scan
        entry: bash -c "command -v gitleaks >/dev/null && gitleaks detect --source . --no-git || echo 'gitleaks not installed; CI runs the canonical scan'"
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: license
        name: license check
        entry: uv run tools/license_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
