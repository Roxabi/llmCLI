[meta]
tool = "llmcli"
uid = 1502

[component.proxy]
container = "llmcli.container"
required_secrets = ["llmcli-litellm-key"]
env_file = "~/.roxabi/llmcli/env/proxy.env"
host_roles = ["llm-worker"]

[component.worker]
container = "llmcli-nats-worker.container"
required_secrets = ["llmcli-nats-worker", "llmcli-litellm-key"]
env_file = "~/.roxabi/llmcli/env/worker.env"
host_roles = ["llm-worker"]
# M₁ ¬llm-worker (VRAM voiceCLI). M₂ small test pour éviter pression VRAM 16 GB.
# Override = informational pour l'instant — .container hardcode --model qwen3-4b.
host_overrides.roxabitower = { model = "qwen3-4b" }

# xAI/Grok (:18645) + Fireworks (:18646) cloud forwarders — MOVED to roxabi-factory
# (roxabi-factory/deploy/quadlet/llmcli-{xai,fw}-forwarder.container + manifest,
# host_roles=["factory-hub"]). The always-on M₁ cloud gateway (LiteLLM proxy +
# forwarders) is now deployed + converged by roxabi-factory (HA: M₁ 24/7).
#
# [component.proxy] above stays here for the M₂ LOCAL hybrid proxy (llm-worker) that
# llmcli-nats-worker calls on localhost:18091. The image (ghcr.io/roxabi/llmcli) and
# forwarder code (src/llmcli/proxy_forwarder/, src/llmcli/auth/) remain owned here —
# factory reuses the published image, pinned by digest.
