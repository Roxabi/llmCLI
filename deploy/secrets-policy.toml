# deploy/secrets-policy.toml — llmCLI secret policy registry
#
# Sibling to deploy/quadlet.toml (per Roxabi container-deployment-standard):
#   - quadlet.toml           required_secrets: which secrets each component needs
#   - secrets-policy.toml:                     what each secret IS and where it comes from
#
# source: path relative to the tool data dir (~/.roxabi/llmcli/)
#         use literal "n/a" for secrets with no file-based source (e.g. generated at runtime)
#
# policy values:
#   required    Hard-fail if source file is missing — secret cannot be recreated without
#               out-of-band recovery; service is broken without it.
#   nats-seed   NKey seed file — generated externally (e.g. factory-acl genkeys or nsc);
#               must be provisioned once per host identity; treat as required.
#   optional    External credential — must be provisioned manually; missing = skip, not error.

# ── API credentials ───────────────────────────────────────────────────────────

[secret.llmcli-litellm-key]
policy = "required"
source = "litellm-key.tok"
# The LiteLLM master key injected as LLMCLI_LITELLM_API_KEY into the proxy and
# nats-worker containers. If this source file is missing the secret cannot be
# recreated without generating a new key and updating all consumers — treat as
# required. File restored on both M₁ and M₂ 2026-06-16.

# ── NATS NKey seeds ───────────────────────────────────────────────────────────

[secret.llmcli-nats-worker]
policy = "nats-seed"
source = "n/a"
# The NATS NKey seed for the llmcli nats-worker identity. Mounted read-only at
# /run/secrets/llmcli-nats-worker.seed inside the container; the worker reads it
# via NATS_NKEY_SEED_PATH. Required on llm-worker hosts only (M₂); absent on M₁
# (¬llm-worker role).
#
# Source = n/a: install.sh says `podman secret create llmcli-nats-worker <seed-file>`
# but does NOT specify a canonical on-disk path under ~/.roxabi/llmcli/. The seed is
# provisioned ad-hoc per host (generated by the factory NKey tooling or nsc, then
# passed directly to `podman secret create`). No standing source file is maintained.
# TBD: decide whether to canonicalise to nkeys/nats-worker.seed under the data dir
# and update install.sh to read from there (mirrors factory pattern).
